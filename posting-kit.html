function showTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '已复制!';
    setTimeout(() => btn.textContent = original, 1500);
  });
}

function createCard(post, showDate = true) {
  const categoryLabels = {
    career: '职业规划', love: '恋爱心理', self: '自我成长', life_decision: '人生选择', personality: '人格测试'
  };
  return `
    <div class="card" data-category="${post.category}">
      <div class="card-header">
        ${showDate ? `<span class="card-date">${post.date}</span>` : ''}
        <span class="card-category">${categoryLabels[post.category] || post.category}</span>
      </div>
      <div class="card-title">${post.title}</div>
      <img class="cover-preview" src="covers/${post.id}.png" alt="${post.title}">
      <div class="body-text">${post.body.replace(/\n/g, '<br>')}</div>
      <div class="actions">
        <button class="btn btn-primary" onclick="copyText('${post.title}\\n\\n${post.body.replace(/'/g, "\\'")}', this)">复制正文</button>
        <button class="btn btn-secondary" onclick="copyText('${post.link}', this)">复制测试链接</button>
        <a class="btn btn-secondary" href="${post.link}" target="_blank">预览测试</a>
      </div>
    </div>
  `;
}

function render() {
  document.getElementById('schedule').innerHTML = posts.map(p => createCard(p, true)).join('');
  document.getElementById('career').innerHTML = posts.filter(p => p.category === 'career').map(p => createCard(p, true)).join('');
  document.getElementById('love').innerHTML = posts.filter(p => p.category === 'love').map(p => createCard(p, true)).join('');
  document.getElementById('all').innerHTML = posts.map(p => createCard(p, true)).join('');
}

render();
</script>
