<script>
(function(){
function safeInt(v,d){d=d||0;try{var n=parseInt(v);return isNaN(n)?d:n;}catch(e){return d;}}

var notes=RAW_DATA.map(function(r,i){return{
  id:i,title:r.title||'',views:safeInt(r.estimated_views),
  likes:safeInt(r.likes),saves:safeInt(r.saves),
  comments:safeInt(r.comments),shares:safeInt(r.shares),
  time:r.publish_time||''
};}).filter(function(r){return r.title&&r.views>0;});

notes.sort(function(a,b){return b.views-a.views;});

// Categorization
var PATTERNS={
  '二选一困境':['换工作','换活法','继续等','主动追','心动','合适'],
  '人格分类':['你是哪种','人格','类型'],
  '测试承诺':['测一测','测测'],
  '命运揭示':['决定了','已经替你','暴露了'],
  '好奇驱动':['其实','原来','到底','为什么'],
  '情感共鸣':['失恋','分手','前任','渣','受伤'],
  '金钱关系':['花钱','金钱','AA','付费','物质'],
  '职场成长':['工作','职场','辞职','加班','老板'],
  '关系矛盾':['吵架','冷战','嫉妒','占有'],
  '自我探索':['发现','找到','认识自己','了解自己']
};

function classify(t){
  for(var c in PATTERNS)
    for(var i=0;i<PATTERNS[c].length;i++)
      if(t.indexOf(PATTERNS[c][i])>=0)return c;
  return '其他';
}

function broad(t){
  if(/爱|恋|情|追|伴侣|结婚|分手|前任|渣|依赖/.test(t))return'恋爱';
  if(/工作|职|加班|老板|辞职|上班|工资|创业/.test(t))return'职场';
  if(/人|性格|自己|我|内向|外向/.test(t))return'人格';
  return'其他';
}

notes.forEach(function(n){
  n.cat=classify(n.title);n.broad=broad(n.title);
  n.eng=n.views>0?((n.likes+n.saves+n.comments+n.shares)/n.views*100):0;
  n.engF=n.eng.toFixed(2)+'%';
});
var thresh=notes[Math.floor(notes.length*0.2)].views;
notes.forEach(function(n){n.hot=n.views>=thresh;});

// Stats
var tv=0,tl=0,tc=0;notes.forEach(function(n){tv+=n.views;tl+=n.likes;tc+=n.comments;});
var avgV=Math.round(tv/notes.length);
var avgE=(notes.reduce(function(s,n){return s+n.eng;},0)/notes.length).toFixed(2);
var hn=notes.filter(function(n){return n.hot;});

document.getElementById('statsRow').innerHTML=[
  {n:notes.length,l:'笔记总数',s:''},
  {n:(tv/10000).toFixed(1)+'万',l:'总阅读量',s:''},
  {n:avgV.toLocaleString(),l:'篇均阅读',s:''},
  {n:avgE+'%',l:'平均互动率',s:'点赞+收藏+评论+分享'},
  {n:hn.length,l:'爆款笔记',s:'Top 20%'},
  {n:tc.toLocaleString(),l:'总评论数',s:''}
].map(function(s){return'<div class="stat-card"><div class="num">'+s.n+'</div><div class="label">'+s.l+'</div><div class="sub">'+s.s+'</div></div>';}).join('');

// Insights
var hE=hn.reduce(function(s,n){return s+n.eng;},0)/hn.length;
var cE=notes.filter(function(n){return!n.hot;}).reduce(function(s,n){return s+n.eng;},0)/notes.filter(function(n){return!n.hot;}).length;

var catV={},catC={};
notes.forEach(function(n){catV[n.cat]=(catV[n.cat]||0)+n.views;catC[n.cat]=(catC[n.cat]||0)+1;});
var bc='',ba=0;
for(var c in catV){var a=catV[c]/catC[c];if(a>ba){ba=a;bc=c;}}

document.getElementById('insightsList').innerHTML=[
  '<span class="red">爆款互动率: '+hE.toFixed(2)+'%</span> vs 普通: '+cE.toFixed(2)+'% — <b>'+(hE/cE).toFixed(1)+'倍</b>',
  '<span class="gold">最高流量类别: '+bc+'</span>，篇均 '+Math.round(ba).toLocaleString()+' 阅读',
  'Top 1 爆款占总流量 '+(notes[0].views/tv*100).toFixed(1)+'%',
  '前5篇贡献总流量 '+(notes.slice(0,5).reduce(function(s,n){return s+n.views;},0)/tv*100).toFixed(1)+'% — <b>头部效应明显</b>',
  '<span class="blue">评论数远超收藏分享</span>，适合做评论区引流'
].map(function(i){return'<li>'+i+'</li>';}).join('');

// Charts
var catColors=['#2B3957','#4A6FA5','#6B8E7F','#D97757','#E8A87C','#95A5A6','#3498DB','#9B59B6','#1ABC9C','#F39C12'];

var cl=Object.keys(catV);
new Chart(document.getElementById('chartCategory'),{
  type:'doughnut',
  data:{labels:cl,datasets:[{data:cl.map(function(c){return catV[c];}),backgroundColor:catColors.slice(0,cl.length),borderWidth:0}]},
  options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{padding:16,usePointStyle:true}}}}
});

new Chart(document.getElementById('chartEngagement'),{
  type:'bar',
  data:{labels:['爆款笔记','普通笔记'],datasets:[{label:'互动率(%)',data:[parseFloat(hE.toFixed(2)),parseFloat(cE.toFixed(2))],backgroundColor:['#E74C3C','#95A5A6'],borderRadius:8}]},
  options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
});

new Chart(document.getElementById('chartScatter'),{
  type:'scatter',
  data:{datasets:[{label:'笔记',data:notes.map(function(n){return{x:Math.log10(Math.max(n.views,1)),y:n.eng};}),
    backgroundColor:notes.map(function(n){return n.hot?'#E74C3C':'#95A5A6';}),pointRadius:5,pointHoverRadius:8}]},
  options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},
    tooltip:{callbacks:{label:function(ctx){var n=notes[ctx.dataIndex];return n.title.substring(0,30)+': '+n.views.toLocaleString()+' views';}}}},
    scales:{x:{title:{display:true,text:'阅读量 (log10)'}},y:{title:{display:true,text:'互动率 (%)'}}}}
});

// Formula performance
var fKeys=Object.keys(catV).sort(function(a,b){return(catV[b]/catC[b])-(catV[a]/catC[a]);});
var fAvg={};fKeys.forEach(function(k){fAvg[k]=Math.round(catV[k]/catC[k]);});

new Chart(document.getElementById('chartFormula'),{
  type:'bar',
  data:{labels:fKeys,datasets:[{label:'篇均阅读',data:fKeys.map(function(k){return fAvg[k];}),backgroundColor:fKeys.map(function(k,i){return catColors[i%catColors.length];}),borderRadius:8}]},
  options:{indexAxis:'y',responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'篇均阅读量'}}}}
});

// TOP TABLE
var tbody='';
notes.slice(0,20).forEach(function(n,i){
  tbody+='<tr><td><b>'+(i+1)+'</b></td><td title="'+n.title.replace(/"/g,'&quot;')+'">'+n.title.substring(0,30)+(n.title.length>30?'...':'')+'</td><td>'+n.views.toLocaleString()+'</td><td>'+n.likes.toLocaleString()+'</td><td>'+n.saves.toLocaleString()+'</td><td>'+n.comments.toLocaleString()+'</td><td>'+n.shares.toLocaleString()+'</td><td><span class="badge '+(n.eng>5?'badge-hot':n.eng>2?'badge-good':'badge-normal')+'">'+n.engF+'</span></td><td>'+n.cat+'</td></tr>';
});
document.querySelector('#topTable tbody').innerHTML=tbody;

// Strategy
var bV={},bC={},bE={};
notes.forEach(function(n){bV[n.broad]=(bV[n.broad]||0)+n.views;bC[n.broad]=(bC[n.broad]||0)+1;bE[n.broad]=(bE[n.broad]||0)+n.eng;});

var sh='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;">';
for(var b in bV){
  sh+='<div style="padding:16px;background:#f8f9fb;border-radius:8px;"><div style="font-size:15px;font-weight:600;color:#2B3957;margin-bottom:8px;">'+b+'类</div><div style="font-size:13px;color:#666;">篇数: '+bC[b]+' | 篇均: '+Math.round(bV[b]/bC[b]).toLocaleString()+' | 互动率: '+(bE[b]/bC[b]).toFixed(2)+'%</div></div>';
}
sh+='</div>';

sh+='<div style="margin-top:20px;padding:16px;background:#EAF2F8;border-radius:8px;"><div style="font-weight:600;color:#2980B9;margin-bottom:8px;">🎯 标题公式排名</div>';
fKeys.slice(0,5).forEach(function(k,i){sh+='<div style="padding:4px 0;font-size:14px;"><b>'+(i+1)+'.</b> '+k+' — 篇均 '+fAvg[k].toLocaleString()+' ('+catC[k]+'篇)</div>';});
sh+='</div>';

sh+='<div style="margin-top:20px;padding:16px;background:#FDEDEC;border-radius:8px;"><div style="font-weight:600;color:#E74C3C;margin-bottom:8px;">⚠ 发布策略建议</div><ol style="font-size:14px;line-height:2;margin-left:18px;"><li><b>坚定不移用最强公式</b>: '+fKeys[0]+' 标题公式篇均阅读最高</li><li><b>二选一困境是流量密码</b>: 制造悬念天然引发点击</li><li><b>每天1篇即可</b>: 频率稳定比高频更重要</li><li><b>评论区引流</b>: 评论远多于收藏分享，宜评论区置顶测试链接</li><li><b>头部效应明显</b>: 爆款可复用结构到新选题</li></ol></div>';

document.getElementById('strategyContent').innerHTML=sh;
})();
</script>
